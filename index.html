<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumos Race - Phiên bản ổn định</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: #e2e8f0; 
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .success-glow { box-shadow: 0 0 15px rgba(16, 185, 129, 0.15); }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- Hợp nhất SVG Icons vào một component an toàn ---
        const Icon = ({ name, size = 18, color = "currentColor" }) => {
            const renderPath = () => {
                switch(name) {
                    case 'zap': return <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />;
                    case 'trophy': return (
                        <g>
                            <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22M9 2h6v10H9V2z" />
                        </g>
                    );
                    case 'plus': return <path d="M12 5v14M5 12h14" />;
                    case 'users': return (
                        <g>
                            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" />
                        </g>
                    );
                    case 'trash': return <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />;
                    case 'check': return <polyline points="20 6 9 17 4 12" />;
                    case 'search': return <circle cx="11" cy="11" r="8"></circle>;
                    case 'save': return (
                        <g>
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                            <polyline points="17 21 17 13 7 13 7 21" />
                            <polyline points="7 3 7 8 15 8" />
                        </g>
                    );
                    default: return <circle cx="12" cy="12" r="10" />;
                }
            };

            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{display: 'inline-block', verticalAlign: 'middle'}}>
                    {renderPath()}
                </svg>
            );
        };

        const RACE_SCHEDULE = [
            { id: 1, title: "Thân Mật + Hẹn Hò + Khí", duration: 3 },
            { id: 2, title: "Tư Chất + Bạc + Dược", duration: 3 },
            { id: 3, title: "Thể Lực + Mèo + Cây", duration: 3 },
            { id: 4, title: "Luân Chiến + Thân Mật + Hoa + Khí", duration: 4 },
            { id: 5, title: "Thể Lực + Tư Chất + Cầu Nguyện", duration: 4 },
        ];

        const START_DATE = new Date(2026, 2, 23); 
        const TOTAL_CYCLE_DAYS = RACE_SCHEDULE.reduce((a, b) => a + b.duration, 0);

        function App() {
            const [players, setPlayers] = useState([]);
            const [view, setView] = useState('board');
            const [searchTerm, setSearchTerm] = useState("");
            const [regName, setRegName] = useState("");
            const [regCategory, setRegCategory] = useState("Thân Mật");
            const [regTop, setRegTop] = useState("Top 1");
            const [loaded, setLoaded] = useState(false);

            useEffect(() => {
                const saved = localStorage.getItem('lumos_race_players');
                if (saved) {
                    try {
                        setPlayers(JSON.parse(saved));
                    } catch (e) {
                        console.error("Lỗi parse dữ liệu", e);
                    }
                }
                setLoaded(true);
            }, []);

            useEffect(() => {
                if (loaded) {
                    localStorage.setItem('lumos_race_players', JSON.stringify(players));
                }
            }, [players, loaded]);

            const currentRace = useMemo(() => {
                const now = new Date();
                const diffDays = Math.floor((now - START_DATE) / (1000 * 60 * 60 * 24));
                const dayInCycle = ((diffDays % TOTAL_CYCLE_DAYS) + TOTAL_CYCLE_DAYS) % TOTAL_CYCLE_DAYS;
                let acc = 0;
                for (const race of RACE_SCHEDULE) {
                    if (dayInCycle >= acc && dayInCycle < acc + race.duration) {
                        return { ...race, remaining: race.duration - (dayInCycle - acc) };
                    }
                    acc += race.duration;
                }
                return RACE_SCHEDULE[0];
            }, []);

            const handleAdd = (e) => {
                e.preventDefault();
                if (!regName.trim()) return;
                const newPlayer = {
                    id: Date.now(),
                    name: regName.toUpperCase().trim(),
                    category: regCategory,
                    top: regTop,
                    status: 'active',
                    date: new Date().toLocaleDateString('vi-VN')
                };
                setPlayers(prev => [...prev, newPlayer]);
                setRegName("");
                setView('queue');
            };

            const markDone = (id) => {
                setPlayers(prev => prev.map(p => p.id === id ? { ...p, status: 'done' } : p));
            };

            const remove = (id) => {
                setPlayers(prev => prev.filter(p => p.id !== id));
            };

            return (
                <div className="max-w-xl mx-auto p-4 min-h-screen pb-20">
                    <header className="mb-6">
                        <div className="flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <Icon name="zap" color="#facc15" size={24} />
                                <h1 className="text-2xl font-black italic text-white tracking-tighter">LUMOS RACE</h1>
                            </div>
                            <div className="bg-emerald-500/10 px-3 py-1 rounded-full border border-emerald-500/20 flex items-center gap-1.5">
                                <span className="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                                <span className="text-[10px] font-bold text-emerald-500 uppercase">Live Database</span>
                            </div>
                        </div>
                        
                        <div className="mt-6 flex bg-slate-900/80 p-1 rounded-xl border border-slate-800">
                            {['board', 'queue', 'reg'].map(v => (
                                <button 
                                    key={v}
                                    onClick={() => setView(v)}
                                    className={`flex-1 py-2 text-[11px] font-bold uppercase rounded-lg transition-all ${view === v ? 'bg-indigo-600 text-white' : 'text-slate-500'}`}
                                >
                                    {v === 'board' ? 'Bảng Vàng' : v === 'queue' ? 'Hàng Chờ' : 'Ghi Danh'}
                                </button>
                            ))}
                        </div>
                    </header>

                    <div className="mb-6 bg-indigo-950/30 p-4 rounded-xl border border-indigo-500/20">
                        <div className="flex justify-between items-center">
                            <div>
                                <p className="text-[9px] font-bold text-indigo-400 uppercase tracking-widest mb-1">Đua chặng</p>
                                <h2 className="text-sm font-bold text-white">{currentRace.title}</h2>
                            </div>
                            <div className="text-right">
                                <p className="text-[9px] font-bold text-slate-500 uppercase mb-1">Kết thúc sau</p>
                                <p className="text-sm font-black text-indigo-400">{currentRace.remaining} NGÀY</p>
                            </div>
                        </div>
                    </div>

                    <main className="animate-fade-in" key={view}>
                        {view === 'reg' && (
                            <div className="glass-card p-5 rounded-xl">
                                <h3 className="text-sm font-bold mb-4 text-white uppercase tracking-tight flex items-center gap-2">
                                    <Icon name="plus" size={14}/> Form ghi danh
                                </h3>
                                <form onSubmit={handleAdd} className="space-y-4">
                                    <input 
                                        placeholder="Tên nhân vật..." 
                                        className="w-full bg-black/40 border border-slate-700 p-3 rounded-lg outline-none focus:border-indigo-500 font-bold text-white uppercase"
                                        value={regName}
                                        onChange={e => setRegName(e.target.value)}
                                        required
                                    />
                                    <div className="grid grid-cols-2 gap-3">
                                        <select className="w-full bg-black/40 border border-slate-700 p-3 rounded-lg text-sm text-white outline-none" value={regCategory} onChange={e => setRegCategory(e.target.value)}>
                                            {["Thân Mật", "Hẹn Hò", "Khí", "Tư Chất", "Bạc", "Dược", "Thể Lực", "Mèo", "Cây"].map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                        <select className="w-full bg-black/40 border border-slate-700 p-3 rounded-lg text-sm text-white outline-none" value={regTop} onChange={e => setRegTop(e.target.value)}>
                                            {["Top 1", "Top 2", "Top 3", "Top 5", "Top 10", "Top 20"].map(t => <option key={t} value={t}>{t}</option>)}
                                        </select>
                                    </div>
                                    <button type="submit" className="w-full bg-indigo-600 py-3 rounded-lg font-bold text-white uppercase text-xs tracking-widest active:scale-95 transition-transform">
                                        Đăng ký ngay
                                    </button>
                                </form>
                            </div>
                        )}

                        {view === 'queue' && (
                            <div className="space-y-2">
                                {players.filter(p => p.status === 'active').length === 0 ? (
                                    <p className="text-center py-10 text-slate-500 text-xs italic">Hàng chờ hiện đang trống</p>
                                ) : (
                                    players.filter(p => p.status === 'active').map(p => (
                                        <div key={p.id} className="glass-card p-3 rounded-xl flex justify-between items-center">
                                            <div>
                                                <div className="font-bold text-indigo-300 text-sm">{p.name}</div>
                                                <div className="text-[9px] text-slate-500 font-bold uppercase">{p.category} • {p.top}</div>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => markDone(p.id)} className="p-2 bg-emerald-500/20 text-emerald-500 rounded-lg"><Icon name="check" size={16}/></button>
                                                <button onClick={() => remove(p.id)} className="p-2 bg-red-500/20 text-red-500 rounded-lg"><Icon name="trash" size={16}/></button>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {view === 'board' && (
                            <div className="space-y-2">
                                <div className="flex justify-between items-center mb-2 px-1">
                                    <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Winners ({players.filter(p => p.status === 'done').length})</span>
                                    <input 
                                        placeholder="Tìm..." 
                                        className="bg-slate-900 border border-slate-800 text-[10px] py-1 px-3 rounded-full outline-none w-24 text-white"
                                        onChange={e => setSearchTerm(e.target.value.toUpperCase())}
                                    />
                                </div>
                                {players.filter(p => p.status === 'done' && p.name.includes(searchTerm)).length === 0 ? (
                                    <p className="text-center py-10 text-slate-500 text-xs italic">Chưa có ai đạt giải</p>
                                ) : (
                                    players.filter(p => p.status === 'done' && p.name.includes(searchTerm)).reverse().map(p => (
                                        <div key={p.id} className="bg-slate-900/40 p-4 rounded-xl border border-emerald-500/20 flex justify-between items-center success-glow">
                                            <div>
                                                <div className="font-black text-white italic">{p.name}</div>
                                                <div className="text-[9px] text-emerald-500 font-bold">{p.category} • {p.top}</div>
                                            </div>
                                            <div className="text-right">
                                                <div className="text-[8px] bg-emerald-500 text-black px-1 rounded font-black">TOP</div>
                                                <div className="text-[8px] text-slate-600 mt-1 font-bold">{p.date}</div>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
