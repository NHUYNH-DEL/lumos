<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumos Race Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #05060b; color: #e2e8f0; }
        .glass-card { background: rgba(15, 17, 26, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.03); }
        .nav-active { background: #4f46e5; color: white; box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.5); }
        .empty-slot { border: 2px dashed #1e293b; color: #475569; }
        .custom-input { background: #0f111a; border: 2px solid #1e293b; transition: all 0.2s; }
        .custom-input:focus { border-color: #4f46e5; outline: none; }
        .is-postponed { border-left: 4px solid #f59e0b; background: rgba(245, 158, 11, 0.05) !important; }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="p-6 max-w-6xl mx-auto flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter text-white uppercase">Lumos <span class="text-indigo-500">Race</span></h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em]">Hệ thống quản lý chuyên sâu</p>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="max-w-6xl mx-auto px-4 mb-8 sticky top-4 z-50">
        <div class="flex p-1.5 bg-[#0f111a] rounded-2xl border border-white/5 gap-1 shadow-2xl">
            <button onclick="switchSheet('active')" id="nav-active" class="nav-active flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">🏆 Đua Top</button>
            <button onclick="switchSheet('queue')" id="nav-queue" class="flex-1 py-3 text-slate-500 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">⏳ Hàng Chờ</button>
            <button onclick="switchSheet('register')" id="nav-register" class="flex-1 py-3 text-slate-500 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">✍️ Ghi Danh</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4">
        
        <!-- SHEET 1: ĐUA TOP -->
        <div id="sheet-active" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

        <!-- SHEET 2: HÀNG CHỜ -->
        <div id="sheet-queue" class="hidden space-y-10"></div>

        <!-- SHEET 3: GHI DANH -->
        <div id="sheet-register" class="hidden max-w-lg mx-auto">
            <div class="glass-card p-8 rounded-[32px] border border-white/5 shadow-2xl">
                <h2 class="text-xl font-black text-white uppercase italic text-center mb-8">Đăng ký tham gia</h2>
                <form id="reg-form" class="space-y-5">
                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1 mb-2 block">Tên nhân vật</label>
                        <input type="text" id="reg-name" required placeholder="" class="custom-input w-full p-4 rounded-xl text-white font-black uppercase tracking-tight">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1 mb-2 block">Bảng đua</label>
                            <select id="reg-type" class="custom-input w-full p-4 rounded-xl text-white font-black bg-[#0f111a]">
                                <option>Thân Mật</option>
                                <option>Hẹn Hò</option>
                                <option>Khí</option>
                                <option>Tư Chất</option>
                                <option>Bạc/Dược</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1 mb-2 block">Mục tiêu</label>
                            <select id="reg-top" class="custom-input w-full p-4 rounded-xl text-white font-black bg-[#0f111a]">
                                <option>Top 1</option>
                                <option>Top 2</option>
                                <option>Top 3</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="w-full py-5 bg-indigo-600 rounded-xl text-white font-black uppercase tracking-widest hover:bg-indigo-500 transition-all shadow-lg shadow-indigo-500/20">Xác nhận</button>
                </form>
            </div>
        </div>
    </main>

    <!-- Toast UI -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 bg-white text-black text-[10px] font-black uppercase tracking-widest rounded-full shadow-2xl opacity-0 transition-all z-[100] pointer-events-none"></div>

    <script>
        const TYPES = ["Thân Mật", "Hẹn Hò", "Khí", "Tư Chất", "Bạc/Dược"];
        let players = JSON.parse(localStorage.getItem('lumos_pro_data')) || [];

        function switchSheet(sheet) {
            document.querySelectorAll('main > div').forEach(d => d.classList.add('hidden'));
            document.getElementById(`sheet-${sheet}`).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('nav-active', 'text-white');
                btn.classList.add('text-slate-500');
            });
            document.getElementById(`nav-${sheet}`).classList.add('nav-active', 'text-white');
            if (sheet === 'active') renderActive();
            if (sheet === 'queue') renderQueue();
        }

        function renderActive() {
            const container = document.getElementById('sheet-active');
            container.innerHTML = "";
            TYPES.forEach(type => {
                let html = `
                    <div class="glass-card p-5 rounded-[28px] border border-white/5 space-y-4">
                        <div class="flex justify-between items-center border-b border-white/5 pb-3">
                            <span class="text-xs font-black text-indigo-400 uppercase tracking-widest">${type}</span>
                        </div>
                        <div class="space-y-2">`;

                [1, 2, 3].forEach(rank => {
                    const topStr = `Top ${rank}`;
                    const p = players.find(x => x.type === type && x.top === topStr && x.status === 'active');
                    if (p) {
                        html += `
                            <div class="p-4 bg-white/5 rounded-2xl flex justify-between items-center group">
                                <div>
                                    <div class="text-[9px] font-black text-indigo-400 uppercase mb-0.5">HẠNG ${rank}</div>
                                    <div class="text-sm font-black text-white uppercase italic">${p.name}</div>
                                </div>
                                <button onclick="finish(${p.id})" class="p-2.5 bg-emerald-500/10 text-emerald-500 rounded-xl hover:bg-emerald-500 hover:text-white transition-all">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>
                                </button>
                            </div>`;
                    } else {
                        html += `
                            <div class="p-4 empty-slot rounded-2xl flex justify-between items-center">
                                <div>
                                    <div class="text-[9px] font-black text-slate-700 uppercase mb-0.5">HẠNG ${rank}</div>
                                    <div class="text-sm font-black text-slate-800 uppercase italic">CÒN TRỐNG</div>
                                </div>
                                <button onclick="quickReg('${type}', ${rank})" class="text-[9px] font-black bg-slate-900 text-slate-400 px-3 py-2 rounded-lg hover:bg-indigo-600 hover:text-white transition-all uppercase">Đăng ký</button>
                            </div>`;
                    }
                });
                container.innerHTML += html + `</div></div>`;
            });
        }

        function renderQueue() {
            const container = document.getElementById('sheet-queue');
            container.innerHTML = "";
            TYPES.forEach(type => {
                // Sắp xếp hàng chờ: Người không nhường lên trước, người nhường xuống sau
                const qList = players.filter(p => p.type === type && p.status === 'waiting')
                    .sort((a, b) => {
                        if (a.isPostponed !== b.isPostponed) return a.isPostponed ? 1 : -1;
                        return a.timestamp - b.timestamp;
                    });

                if (qList.length > 0) {
                    let html = `
                        <div class="space-y-4">
                            <div class="flex items-center gap-4"><h3 class="text-xs font-black uppercase text-indigo-400 min-w-fit">${type}</h3><div class="h-px w-full bg-white/5"></div></div>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">`;

                    qList.forEach((p, idx) => {
                        const date = new Date();
                        date.setDate(date.getDate() + (idx + 1) * 17);
                        const dateStr = date.toLocaleDateString('vi-VN');

                        html += `
                            <div class="glass-card p-4 rounded-2xl flex justify-between items-center group ${p.isPostponed ? 'is-postponed opacity-60' : ''}">
                                <div class="flex items-center gap-4">
                                    <div class="text-xs font-black ${p.isPostponed ? 'text-amber-500' : 'text-slate-600'}">${idx + 1}</div>
                                    <div>
                                        <div class="text-sm font-black text-white uppercase flex items-center gap-2">
                                            ${p.name}
                                            ${p.isPostponed ? '<span class="text-[8px] px-1.5 py-0.5 bg-amber-500/20 text-amber-500 rounded">ĐANG NHƯỜNG</span>' : ''}
                                        </div>
                                        <div class="text-[9px] font-bold text-slate-500 uppercase mt-1">${p.top} • Dự kiến: ${dateStr}</div>
                                    </div>
                                </div>
                                <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                    ${p.isPostponed 
                                        ? `<button onclick="togglePostpone(${p.id}, false)" title="Hủy nhường" class="p-2 bg-amber-500/20 text-amber-500 rounded-lg hover:bg-amber-500 hover:text-white transition-all"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg></button>`
                                        : `<button onclick="togglePostpone(${p.id}, true)" title="Nhường lượt" class="p-2 bg-amber-500/10 text-amber-500 rounded-lg hover:bg-amber-500 hover:text-white transition-all"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="m7 13 5 5 5-5M7 6l5 5 5-5"/></svg></button>`
                                    }
                                    <button onclick="moveToActive(${p.id})" title="Lên bảng chính" class="p-2 bg-indigo-500/10 text-indigo-500 rounded-lg hover:bg-indigo-500 hover:text-white transition-all"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>
                                    <button onclick="remove(${p.id})" class="p-2 bg-red-500/10 text-red-500 rounded-lg hover:bg-red-500 hover:text-white transition-all"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
                                </div>
                            </div>`;
                    });
                    container.innerHTML += html + `</div></div>`;
                }
            });
            if (!container.innerHTML) container.innerHTML = `<div class="py-20 text-center text-slate-700 text-[10px] font-black uppercase tracking-widest">Hàng chờ hiện đang trống</div>`;
        }

        function quickReg(type, rank) {
            document.getElementById('reg-type').value = type;
            document.getElementById('reg-top').value = `Top ${rank}`;
            switchSheet('register');
        }

        document.getElementById('reg-form').onsubmit = (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value.toUpperCase();
            const type = document.getElementById('reg-type').value;
            const top = document.getElementById('reg-top').value;
            const isBusy = players.find(x => x.type === type && x.top === top && x.status === 'active');
            players.push({ id: Date.now(), name, type, top, status: isBusy ? 'waiting' : 'active', isPostponed: false, timestamp: Date.now() });
            save("Đã đăng ký!");
            document.getElementById('reg-form').reset();
            switchSheet(isBusy ? 'queue' : 'active');
        };

        function togglePostpone(id, state) {
            const p = players.find(x => x.id === id);
            if (p) {
                p.isPostponed = state;
                save(state ? "Đã nhường lượt cho người khác" : "Đã hủy nhường lượt");
            }
        }

        function finish(id) {
            const p = players.find(x => x.id === id);
            const type = p.type;
            const top = p.top;
            players = players.filter(x => x.id !== id);
            
            // Tìm người kế tiếp trong hàng chờ (không nhường) cho vị trí này
            const next = players.filter(x => x.type === type && x.top === top && x.status === 'waiting' && !x.isPostponed)
                .sort((a,b) => a.timestamp - b.timestamp)[0];
            
            if (next) next.status = 'active';
            save("Xác nhận hoàn thành bảng!");
        }

        function moveToActive(id) {
            const p = players.find(x => x.id === id);
            const busy = players.find(x => x.type === p.type && x.top === p.top && x.status === 'active');
            if (busy) return showToast("Vị trí này đang có người đua!");
            p.status = 'active';
            p.isPostponed = false;
            save("Đã đưa lên bảng chính");
            switchSheet('active');
        }

        function remove(id) { players = players.filter(p => p.id !== id); save("Đã xóa khỏi danh sách"); }

        function save(msg) {
            localStorage.setItem('lumos_pro_data', JSON.stringify(players));
            renderActive();
            renderQueue();
            showToast(msg);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 2000);
        }

        window.onload = renderActive;
    </script>
</body>
</html>
