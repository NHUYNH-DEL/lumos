<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMOS TOP - Quản lý Đua Top</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#080a0f] text-slate-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const RACE_SCHEDULE = [
            { id: 1, title: "Thân Mật + Hẹn Hò + Khí", duration: 3, categories: ["Thân Mật", "Hẹn Hò", "Khí"] },
            { id: 2, title: "Tư Chất + Bạc + Dược", duration: 3, categories: ["Tư Chất", "Bạc", "Dược"] },
            { id: 3, title: "Thế Lực + Mèo + Cây", duration: 3, categories: ["Thế Lực", "Mèo", "Cây"] },
            { id: 4, title: "Luận Chiến + Thân Mật + Hoa + Khí", duration: 4, categories: ["Luận Chiến", "Thân Mật", "Hoa", "Khí"] },
            { id: 5, title: "Thế Lực + Tư Chất + Cầu Nguyện", duration: 4, categories: ["Thế Lực", "Tư Chất", "Cầu Nguyện"] },
        ];

        const ALL_UNIQUE_CATEGORIES = Array.from(new Set(RACE_SCHEDULE.flatMap(r => r.categories))).sort();
        
        // Cấu hình mốc thời gian: Bắt đầu chu kỳ từ ngày 23/03/2026 (theo ví dụ của bạn)
        const START_DATE = new Date(2026, 2, 23); // Tháng 2 là tháng 3 trong JS
        START_DATE.setHours(0, 0, 0, 0);

        const TOTAL_CYCLE_DAYS = RACE_SCHEDULE.reduce((a, b) => a + b.duration, 0);

        function App() {
            const [players, setPlayers] = useState(() => {
                const newData = localStorage.getItem('lumos_v2_players');
                return newData ? JSON.parse(newData) : [];
            });

            const [history, setHistory] = useState([]);
            const [view, setView] = useState('active-race');
            const [searchTerm, setSearchTerm] = useState('');
            const [activeTab, setActiveTab] = useState('All');
            const [currentRaceInfo, setCurrentRaceInfo] = useState({ index: 0, remaining: 0, categories: [] });

            const [regName, setRegName] = useState('');
            const [regCategory, setRegCategory] = useState('');
            const [regTop, setRegTop] = useState('Top 1');

            useEffect(() => {
                localStorage.setItem('lumos_v2_players', JSON.stringify(players));
            }, [players]);

            useEffect(() => {
                const update = () => {
                    const now = new Date();
                    const diffMs = now - START_DATE;
                    const diffDaysFull = diffMs / (1000 * 60 * 60 * 24);
                    const dayInCycle = diffDaysFull < 0 ? 0 : diffDaysFull % TOTAL_CYCLE_DAYS;
                    
                    let acc = 0;
                    for (let i = 0; i < RACE_SCHEDULE.length; i++) {
                        const race = RACE_SCHEDULE[i];
                        if (dayInCycle >= acc && dayInCycle < acc + race.duration) {
                            setCurrentRaceInfo({ 
                                index: i, 
                                remaining: Math.ceil(race.duration - (dayInCycle - acc)), 
                                categories: race.categories 
                            });
                            break;
                        }
                        acc += race.duration;
                    }
                };
                update();
                const timer = setInterval(update, 60000);
                return () => clearInterval(timer);
            }, []);

            // Hàm tính ngày dự kiến: Sửa lỗi tính toán dựa trên Top
            const getExpectedDate = (category, playerTop, playerId) => {
                const now = new Date();
                const diffMs = now - START_DATE;
                const diffDaysFull = diffMs / (1000 * 60 * 60 * 24);
                const currentCycleCount = Math.floor(diffDaysFull / TOTAL_CYCLE_DAYS);
                const dayInCycle = diffDaysFull % TOTAL_CYCLE_DAYS;

                // Tìm chặng của category này
                const raceIndex = RACE_SCHEDULE.findIndex(r => r.categories.includes(category));
                if (raceIndex === -1) return "N/A";

                let startDayOfRaceInCycle = 0;
                for (let i = 0; i < raceIndex; i++) {
                    startDayOfRaceInCycle += RACE_SCHEDULE[i].duration;
                }

                // Lọc danh sách những người đang chờ cùng Category và cùng Top
                const queueForThisTop = players
                    .filter(p => p.status !== 'Đã đạt' && p.category === category && p.top === playerTop)
                    .sort((a, b) => a.regDate - b.regDate);
                
                const rankInQueue = queueForThisTop.findIndex(p => p.id === playerId);
                if (rankInQueue === -1) return "N/A";

                // Mỗi chu kỳ giải quyết được 1 lượt cho mỗi Top của category đó
                const cyclesNeeded = rankInQueue; 

                let totalDaysFromStart = (currentCycleCount + cyclesNeeded) * TOTAL_CYCLE_DAYS + startDayOfRaceInCycle;
                
                // Nếu chặng này trong chu kỳ hiện tại đã kết thúc, phải dời sang chu kỳ sau
                if (dayInCycle > startDayOfRaceInCycle + RACE_SCHEDULE[raceIndex].duration) {
                    totalDaysFromStart += TOTAL_CYCLE_DAYS;
                }

                const expectedDate = new Date(START_DATE.getTime());
                expectedDate.setDate(expectedDate.getDate() + totalDaysFromStart);
                
                return expectedDate.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit' });
            };

            const saveState = () => setHistory([JSON.stringify(players), ...history.slice(0, 9)]);
            
            const undo = () => {
                if (history.length > 0) {
                    setPlayers(JSON.parse(history[0]));
                    setHistory(history.slice(1));
                }
            };

            const updateStatus = (id, newStatus) => {
                saveState();
                setPlayers(players.map(p => p.id === id ? { 
                    ...p, 
                    status: newStatus, 
                    finishDate: newStatus === 'Đã đạt' ? new Date().toLocaleDateString('vi-VN') : (p.finishDate || null)
                } : p));
            };

            const handleRegister = (e) => {
                e.preventDefault();
                saveState();
                const isCurrent = currentRaceInfo.categories.includes(regCategory);
                const newEntry = { 
                    id: Date.now(), 
                    name: regName.toUpperCase(), 
                    category: regCategory, 
                    top: regTop, 
                    status: isCurrent ? "Đang đua" : "Chờ lượt", 
                    regDate: Date.now() 
                };
                setPlayers([...players, newEntry]);
                setRegName('');
                setView('queue');
            };

            const deletePlayer = (id) => {
                const p = players.find(x => x.id === id);
                if(confirm(`Xóa nhân vật ${p?.name}?`)) {
                    saveState();
                    setPlayers(players.filter(p => p.id !== id));
                }
            };

            const activeRaceData = useMemo(() => {
                return currentRaceInfo.categories.map(cat => ({
                    category: cat,
                    rows: ["Top 1", "Top 2", "Top 3"].map(t => ({
                        top: t,
                        player: players.find(p => p.category === cat && p.top === t && p.status === 'Đang đua') || null
                    }))
                }));
            }, [players, currentRaceInfo]);

            const groupedQueue = useMemo(() => {
                const filtered = players.filter(p => p.status !== 'Đã đạt' && (activeTab === 'All' || p.category === activeTab) && p.name.includes(searchTerm.toUpperCase()));
                const groups = {};
                filtered.forEach(p => { 
                    if (!groups[p.category]) groups[p.category] = []; 
                    groups[p.category].push(p); 
                });
                return groups;
            }, [players, searchTerm, activeTab]);

            const finishedPlayers = useMemo(() => players.filter(p => p.status === 'Đã đạt'), [players]);

            return (
                <div className="min-h-screen pb-24 text-slate-300">
                    <header className="sticky top-0 z-40 bg-[#080a0f]/90 backdrop-blur-md border-b border-white/5 px-4 py-3">
                        <div className="max-w-5xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                                    <Icon name="zap" className="text-white" />
                                </div>
                                <h1 className="text-lg font-black italic text-white hidden sm:block">LUMOS TOP</h1>
                            </div>
                            <div className="flex gap-2">
                                {history.length > 0 && (
                                    <button onClick={undo} className="p-2 bg-slate-800 text-slate-300 rounded-lg hover:bg-slate-700">
                                        <Icon name="undo-2" size={18} />
                                    </button>
                                )}
                                <nav className="flex items-center bg-slate-900/50 p-1 rounded-xl border border-white/5 text-[10px] font-black">
                                    <button onClick={() => setView('active-race')} className={`px-4 py-2 rounded-lg ${view === 'active-race' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-500'}`}>BẢNG ĐUA</button>
                                    <button onClick={() => setView('queue')} className={`px-4 py-2 rounded-lg ${view === 'queue' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-500'}`}>HÀNG CHỜ</button>
                                    <button onClick={() => setView('register')} className={`px-4 py-2 rounded-lg ${view === 'register' ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-500'}`}>GHI DANH</button>
                                </nav>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto p-4 space-y-8 mt-4">
                        {/* Status Card */}
                        <section className="bg-gradient-to-br from-indigo-900/40 via-slate-900 to-black border border-indigo-500/20 rounded-[2.5rem] p-8 shadow-2xl flex flex-col md:flex-row justify-between items-center gap-6">
                            <div>
                                <span className="text-[10px] font-black text-yellow-500 uppercase tracking-widest block mb-2 px-3 py-1 bg-yellow-500/10 rounded-full w-fit">Sự kiện hiện tại</span>
                                <h2 className="text-3xl sm:text-4xl font-black text-white italic uppercase tracking-tighter leading-tight">{RACE_SCHEDULE[currentRaceInfo.index]?.title || "Đang tải..."}</h2>
                            </div>
                            <div className="bg-black/40 px-10 py-5 rounded-3xl border border-yellow-500/20 text-center backdrop-blur-sm min-w-[200px]">
                                <span className="text-[10px] font-bold text-yellow-500/60 uppercase">CÒN LẠI</span>
                                <p className="text-5xl font-black text-yellow-400 italic tracking-tighter">{currentRaceInfo.remaining} <span className="text-xl">NGÀY</span></p>
                            </div>
                        </section>

                        {view === 'active-race' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-in">
                                {activeRaceData.map(group => (
                                    <div key={group.category} className="bg-slate-900/30 rounded-3xl p-6 border border-white/5 space-y-4">
                                        <div className="flex items-center gap-3">
                                            <div className="w-2 h-6 bg-indigo-500 rounded-full"></div>
                                            <h3 className="text-sm font-black uppercase text-indigo-400 italic">Bảng {group.category}</h3>
                                        </div>
                                        <div className="space-y-3">
                                            {group.rows.map(row => (
                                                <div key={row.top} className={`flex items-center justify-between p-5 rounded-2xl border transition-all ${row.player ? 'bg-slate-900 border-indigo-500/30' : 'bg-slate-900/10 border-dashed border-white/5 opacity-40'}`}>
                                                    <div className="flex items-center gap-5">
                                                        <div className="flex flex-col items-center">
                                                            <Icon name="trophy" className={row.top === 'Top 1' ? 'text-yellow-500' : 'text-slate-500'} />
                                                            <span className="text-[9px] font-black text-slate-500 mt-1">{row.top}</span>
                                                        </div>
                                                        <span className="text-base font-black text-white uppercase italic">{row.player ? row.player.name : 'TRỐNG'}</span>
                                                    </div>
                                                    {row.player && (
                                                        <div className="flex gap-2">
                                                            <button onClick={() => updateStatus(row.player.id, 'Chờ lượt')} className="p-2 bg-slate-800 text-slate-400 rounded-xl hover:text-white" title="Nhường lượt">
                                                                <Icon name="arrow-down-to-dot" size={16} />
                                                            </button>
                                                            <button onClick={() => updateStatus(row.player.id, 'Đã đạt')} className="px-5 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl text-[10px] font-black italic">XONG</button>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'queue' && (
                            <div className="space-y-6 animate-in">
                                <div className="flex flex-col sm:flex-row gap-4 items-center bg-slate-900/50 p-4 rounded-2xl border border-white/5">
                                    <Icon name="search" className="text-slate-500 ml-2" />
                                    <input type="text" placeholder="TÌM TÊN..." className="flex-1 bg-transparent border-none text-xs font-bold text-white outline-none uppercase" onChange={(e) => setSearchTerm(e.target.value)} />
                                    <select onChange={(e) => setActiveTab(e.target.value)} className="bg-slate-800 border-none rounded-xl px-4 py-2 text-[10px] font-black text-indigo-400 outline-none">
                                        <option value="All">TẤT CẢ BẢNG</option>
                                        {ALL_UNIQUE_CATEGORIES.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                    </select>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    {Object.entries(groupedQueue).map(([category, items]) => (
                                        <div key={category} className="space-y-4">
                                            <div className="flex justify-between items-end border-b border-white/5 pb-2">
                                                <h3 className="text-[11px] font-black text-indigo-500 uppercase tracking-widest">{category}</h3>
                                                <span className="text-[9px] font-bold text-slate-600">DỰ KIẾN</span>
                                            </div>
                                            <div className="space-y-2">
                                                {items.map((p, idx) => (
                                                    <div key={p.id} className="flex items-center justify-between p-4 bg-slate-900/40 rounded-2xl border border-white/5 group">
                                                        <div className="flex items-center gap-4">
                                                            <span className="text-[10px] font-black text-slate-700 w-4 italic">#{idx + 1}</span>
                                                            <div>
                                                                <p className="text-xs font-black text-white uppercase italic">{p.name} <span className="text-[9px] text-indigo-400/60 not-italic ml-2">{p.top}</span></p>
                                                                <div className="flex items-center gap-2 mt-1">
                                                                    <span className={`text-[8px] font-bold uppercase ${p.status === 'Đang đua' ? 'text-emerald-400' : 'text-slate-600'}`}>
                                                                        {p.status}
                                                                    </span>
                                                                    <span className="text-[8px] text-slate-500">•</span>
                                                                    <span className="text-[8px] font-black text-yellow-500/80 uppercase">
                                                                        Lượt: {getExpectedDate(p.category, p.top, p.id)}
                                                                    </span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                            <button onClick={() => updateStatus(p.id, p.status === 'Đang đua' ? 'Chờ lượt' : 'Đang đua')} className="p-2 bg-indigo-500/10 text-indigo-400 rounded-lg">
                                                                <Icon name={p.status === 'Đang đua' ? "arrow-down-to-dot" : "arrow-up-to-line"} size={14}/>
                                                            </button>
                                                            <button onClick={() => deletePlayer(p.id)} className="p-2 bg-red-500/10 text-red-500 rounded-lg hover:bg-red-500 hover:text-white transition-all">
                                                                <Icon name="trash-2" size={14}/>
                                                            </button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'register' && (
                            <div className="max-w-md mx-auto bg-slate-900 p-8 rounded-[2rem] border border-white/5 shadow-2xl animate-in">
                                <h2 className="text-2xl font-black text-white text-center mb-8 italic uppercase">GHI DANH TRANH HẠNG</h2>
                                <form onSubmit={handleRegister} className="space-y-5">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-500 uppercase ml-2">Tên Nhân Vật</label>
                                        <input required type="text" value={regName} onChange={(e) => setRegName(e.target.value)} className="w-full bg-black/50 border border-white/5 rounded-2xl p-4 text-sm font-black text-white uppercase outline-none focus:border-indigo-500/50" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-500 uppercase ml-2">Bảng Đua</label>
                                            <select required value={regCategory} onChange={(e) => setRegCategory(e.target.value)} className="w-full bg-black/50 border border-white/5 rounded-2xl p-4 text-xs font-black text-indigo-400">
                                                <option value="">-- CHỌN --</option>
                                                {ALL_UNIQUE_CATEGORIES.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-500 uppercase ml-2">Mục Tiêu</label>
                                            <select value={regTop} onChange={(e) => setRegTop(e.target.value)} className="w-full bg-black/50 border border-white/5 rounded-2xl p-4 text-xs font-black text-yellow-500">
                                                <option value="Top 1">TOP 1</option>
                                                <option value="Top 2">TOP 2</option>
                                                <option value="Top 3">TOP 3</option>
                                            </select>
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl font-black italic shadow-lg shadow-emerald-500/20">XÁC NHẬN GHI DANH</button>
                                </form>
                            </div>
                        )}

                        {finishedPlayers.length > 0 && (
                            <section className="pt-10 border-t border-white/5">
                                <div className="flex items-center gap-3 mb-6">
                                    <Icon name="award" className="text-yellow-500" />
                                    <h2 className="text-lg font-black text-white italic uppercase">BẢNG VÀNG DANH VỌNG</h2>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                                    {finishedPlayers.map(p => (
                                        <div key={p.id} className="bg-yellow-500/5 p-4 rounded-2xl border border-yellow-500/10 flex items-center justify-between group">
                                            <div>
                                                <p className="text-xs font-black text-yellow-500 italic uppercase">{p.name}</p>
                                                <p className="text-[9px] text-slate-500 font-bold uppercase">{p.category} - {p.top}</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-[10px] text-slate-400 font-bold">{p.finishDate}</p>
                                                <button onClick={() => updateStatus(p.id, 'Chờ lượt')} className="mt-1 text-[8px] font-black text-indigo-400 opacity-0 group-hover:opacity-100 uppercase">Khôi phục</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        )}
                    </main>

                    <footer className="fixed bottom-0 left-0 right-0 bg-black/80 backdrop-blur-xl border-t border-white/5 p-3 text-center">
                        <p className="text-[9px] font-black text-slate-600 tracking-widest uppercase italic">Thiết kế cho anh em Lumos</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
