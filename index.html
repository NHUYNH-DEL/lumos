<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMOS RACE - Hệ Thống Ghi Danh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020408; }
        .animate-bounce-slow { animation: bounce-slow 4s ease-in-out infinite; }
        @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        [v-cloak] { display: none; }
        .nav-btn { transition: all 0.3s ease; }
    </style>
</head>
<body class="text-slate-200 pb-24">

    <div id="top-bar" class="py-1.5 px-6 text-center text-[10px] font-black uppercase tracking-[0.25em] text-white/90 bg-indigo-600 transition-colors duration-500">
        LUMOS RACE SYSTEM • GIAI ĐOẠN CHỐT CHẶNG • CHU KỲ 20 NGÀY
    </div>

    <div class="bg-slate-900/90 border-b border-white/5 py-3 px-6 sticky top-0 z-50 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-8">
                <h1 class="text-2xl font-black italic text-white uppercase tracking-tighter">
                    LUMOS <span class="text-indigo-500">RACE</span>
                </h1>
                <nav class="flex items-center gap-1 bg-black/40 p-1 rounded-2xl border border-white/5">
                    <button onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-btn flex items-center gap-2 px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-tighter bg-indigo-600 text-white shadow-lg">
                        Bảng Đua
                    </button>
                    <button onclick="switchTab('halloffame')" id="nav-halloffame" class="nav-btn flex items-center gap-2 px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-tighter text-slate-500 hover:text-white">
                        Bảng Vàng
                    </button>
                </nav>
            </div>
            
            <div class="flex items-center gap-4 bg-black/60 px-5 py-2 rounded-2xl border border-white/10">
                <div class="flex flex-col items-end pr-4 border-r border-white/10 text-right">
                    <span id="header-stage-name" class="text-[9px] font-black text-indigo-400 uppercase tracking-widest">...</span>
                    <span id="header-stage-info" class="text-[11px] font-black text-white italic">CHẶNG 0 • NGÀY 0/4</span>
                </div>
                <div class="text-center min-w-[90px]">
                    <div id="timer-label" class="text-[8px] font-bold text-slate-500 uppercase mb-0.5">HẠN CHỐT</div>
                    <div id="timer-display" class="text-lg font-black italic leading-none font-mono text-indigo-400">00:00:00</div>
                </div>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-6 pt-10 space-y-12">
        
        <div id="tab-dashboard" class="tab-content space-y-12">
            <section class="bg-gradient-to-b from-indigo-500/10 to-transparent p-10 rounded-[45px] border border-white/5 relative overflow-hidden">
                <div class="mb-12 flex flex-col md:flex-row items-center justify-between gap-6 relative z-10">
                    <div class="flex items-center gap-5">
                        <div id="focus-icon-box" class="w-16 h-16 rounded-3xl flex items-center justify-center border-2 bg-indigo-500/10 text-indigo-400 border-indigo-500/20">
                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                        </div>
                        <div>
                            <h2 id="focus-stage-name" class="text-3xl font-black text-white uppercase italic tracking-tighter leading-none">---</h2>
                            <p id="focus-stage-desc" class="text-slate-500 text-[10px] font-black uppercase tracking-[0.3em] mt-2">Nội dung chặng hiện tại</p>
                        </div>
                    </div>
                    <button onclick="switchTab('add')" class="bg-white text-black font-black px-10 py-4 rounded-2xl hover:bg-indigo-500 hover:text-white transition-all shadow-xl flex items-center gap-3 text-xs uppercase">
                        GHI DANH ĐUA MỚI
                    </button>
                </div>
                
                <div id="current-race-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8 relative z-10">
                    </div>
            </section>

            <section class="space-y-6">
                <div class="flex items-center justify-between px-4">
                    <h2 class="text-2xl font-black text-white uppercase italic">THỨ TỰ HÀNG CHỜ ĐĂNG KÝ</h2>
                </div>
                <div class="bg-[#05070a] border border-white/5 rounded-[40px] overflow-hidden shadow-2xl overflow-x-auto custom-scrollbar">
                    <table class="w-full text-left border-collapse min-w-[900px]">
                        <thead>
                            <tr class="bg-white/[0.02] border-b border-white/5">
                                <th class="p-8 text-[11px] font-black text-slate-500 uppercase tracking-widest">STT</th>
                                <th class="p-8 text-[11px] font-black text-slate-500 uppercase tracking-widest">Tên Chị Đẹp</th>
                                <th class="p-8 text-[11px] font-black text-slate-500 uppercase tracking-widest text-center">Nội dung</th>
                                <th class="p-8 text-[11px] font-black text-slate-500 uppercase tracking-widest text-center">Mục tiêu</th>
                                <th class="p-8 text-[11px] font-black text-slate-500 uppercase tracking-widest">Lịch thi đấu</th>
                                <th class="p-8 text-[11px] font-black text-slate-500 uppercase tracking-widest text-right">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="waiting-list-body" class="divide-y divide-white/5">
                            </tbody>
                    </table>
                </div>
            </section>
        </div>

        <div id="tab-halloffame" class="tab-content hidden space-y-10">
            <div class="flex flex-col items-center text-center gap-6 py-10">
                <div class="w-24 h-24 bg-amber-500/20 rounded-[35px] flex items-center justify-center border border-amber-500/40 text-amber-500 animate-bounce-slow">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8.21 13.89L7 23l5-3 5 3-1.21-9.12"/><circle cx="12" cy="9" r="7"/></svg>
                </div>
                <h2 class="text-6xl font-black text-white italic uppercase tracking-tighter">BẢNG VÀNG DANH VỌNG</h2>
            </div>
            <div id="hof-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>

        <div id="tab-add" class="tab-content hidden">
            <div class="max-w-2xl mx-auto bg-[#0f111a] p-16 rounded-[60px] border border-white/10">
                <h2 class="text-4xl font-black text-white uppercase italic text-center mb-12">GHI DANH ĐUA</h2>
                <form id="registration-form" class="space-y-8">
                    <div class="space-y-4">
                        <label class="text-[11px] font-black text-slate-500 uppercase ml-6">Tên Chị Đẹp</label>
                        <input type="text" id="form-name" class="w-full bg-black/60 border-2 border-white/5 p-8 rounded-[30px] text-white font-black uppercase text-2xl outline-none focus:border-indigo-500" placeholder="VÍ DỤ: LAN_CHI" required>
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <div class="space-y-4">
                            <label class="text-[11px] font-black text-slate-500 uppercase ml-6">Nội Dung</label>
                            <select id="form-subtype" class="w-full bg-black/60 border-2 border-white/5 p-8 rounded-[30px] text-white font-black outline-none focus:border-indigo-500 uppercase"></select>
                        </div>
                        <div class="space-y-4">
                            <label class="text-[11px] font-black text-slate-500 uppercase ml-6">Mục Tiêu</label>
                            <select id="form-top" class="w-full bg-black/60 border-2 border-white/5 p-8 rounded-[30px] text-white font-black outline-none focus:border-indigo-500">
                                <option value="Top 1">TOP 1</option><option value="Top 2">TOP 2</option><option value="Top 3">TOP 3</option>
                            </select>
                        </div>
                    </div>
                    <div class="pt-4 flex gap-4">
                        <button type="button" onclick="switchTab('dashboard')" class="w-1/3 py-8 bg-white/5 text-slate-400 font-black rounded-[30px]">HỦY</button>
                        <button type="submit" class="w-2/3 py-8 bg-indigo-600 text-white font-black rounded-[30px]">XÁC NHẬN</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div id="notification" class="fixed bottom-10 right-10 z-[1000] bg-indigo-950/90 border border-indigo-500/50 p-6 rounded-[35px] shadow-2xl flex flex-col gap-2 max-w-sm hidden transition-all">
        <p id="notification-text" class="text-sm font-bold text-white italic">---</p>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js';
        import { getFirestore, collection, doc, setDoc, onSnapshot, query, deleteDoc, writeBatch, addDoc } from 'https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js';
        import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js';

        // --- Config ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { apiKey: "demo", projectId: "demo" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'lumos-race-v10';

        const CYCLE_START_DATE = new Date(2026, 2, 19, 0, 0, 0); 
        const CYCLE_DAYS = 20;
        const STAGES = [
            { id: 1, name: "Thế Lực + Tư Chất + Cầu Nguyện", startDay: 1, items: ["Thế Lực", "Tư Chất", "Cầu Nguyện"] },
            { id: 2, name: "Thân Mật + Hẹn Hò + Khí", startDay: 5, items: ["Thân Mật", "Hẹn Hò", "Khí"] },
            { id: 3, name: "Tư Chất + Bạc + Dược", startDay: 9, items: ["Tư Chất", "Bạc", "Dược"] },
            { id: 4, name: "Thế Lực + Mèo + Cây", startDay: 13, items: ["Thế Lực", "Mèo", "Cây"] },
            { id: 5, name: "Luận Chiến + Thân Mật + Hoa + Khí", startDay: 17, items: ["Luận Chiến", "Thân Mật", "Hoa", "Khí"] },
        ];

        let players = [], history = [], activeStage = STAGES[0], dayOfStage = 1, timeStatus = {};

        // --- Global Functions ---
        window.switchTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + tabId).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('bg-indigo-600', 'text-white', 'shadow-lg'));
            const activeNav = document.getElementById('nav-' + tabId);
            if (activeNav) activeNav.classList.add('bg-indigo-600', 'text-white', 'shadow-lg');
        };

        function getRealDateRange(stageId, cycleOffset) {
            const stage = STAGES.find(s => s.id === stageId);
            const start = new Date(CYCLE_START_DATE);
            start.setDate(CYCLE_START_DATE.getDate() + (cycleOffset * CYCLE_DAYS) + (stage.startDay - 1));
            const end = new Date(start); end.setDate(start.getDate() + 3);
            return { start, end };
        }

        function showNotify(text) {
            const el = document.getElementById('notification');
            document.getElementById('notification-text').innerText = text;
            el.classList.remove('hidden'); setTimeout(() => el.classList.add('hidden'), 3000);
        }

        function updateTime() {
            const now = new Date();
            const diffDays = Math.floor((now - CYCLE_START_DATE) / 86400000);
            const currentDayInCycle = (diffDays % CYCLE_DAYS) + 1;
            activeStage = STAGES.find(s => currentDayInCycle >= s.startDay && currentDayInCycle < s.startDay + 4) || STAGES[0];
            dayOfStage = (currentDayInCycle - activeStage.startDay) + 1;

            const deadline = new Date(now); deadline.setHours(22, 0, 0, 0);
            if (dayOfStage === 4 && now >= deadline) {
                timeStatus = { isResting: true, label: "NGHỈ NGƠI", timer: "Chờ chặng mới" };
            } else {
                const cycleIdx = Math.floor(diffDays / CYCLE_DAYS);
                const { end } = getRealDateRange(activeStage.id, cycleIdx);
                end.setHours(22, 0, 0, 0);
                const diff = end - now;
                const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
                timeStatus = { isResting: false, label: "HẠN CHỐT", timer: `${h}:${m}:${s}` };
            }
            renderDynamicUI();
        }

        function renderDynamicUI() {
            document.getElementById('header-stage-name').innerText = activeStage.name.split(' + ')[0] + "...";
            document.getElementById('header-stage-info').innerText = `CHẶNG ${activeStage.id} • NGÀY ${dayOfStage}/4`;
            document.getElementById('timer-label').innerText = timeStatus.label;
            document.getElementById('timer-display').innerText = timeStatus.timer;
            document.getElementById('focus-stage-name').innerText = activeStage.name;

            const grid = document.getElementById('current-race-grid');
            grid.innerHTML = activeStage.items.map(sub => {
                const cards = ['Top 1', 'Top 2', 'Top 3'].map(top => {
                    const p = players.find(x => x.stageId === activeStage.id && x.subType === sub && x.top === top && x.cycleOffset === 0);
                    return `<div class="p-6 rounded-3xl border ${p ? 'bg-indigo-500/20 border-indigo-500' : 'bg-black/20 border-white/5 opacity-40'}">
                        <span class="text-[10px] block mb-2 font-black text-indigo-400">${top}</span>
                        <span class="text-lg font-black text-white uppercase">${p ? p.name : 'ĐANG TRỐNG'}</span>
                        ${p ? `<button onclick="handleComplete('${p.id}')" class="mt-4 block w-full bg-emerald-500 py-2 rounded-xl text-[10px] font-black">XÁC NHẬN XONG</button>` : ''}
                    </div>`;
                }).join('');
                return `<div class="bg-black/40 rounded-[40px] p-8 border border-white/5">
                    <div class="text-xs font-black text-indigo-400 mb-6">${sub}</div>
                    <div class="space-y-4">${cards}</div>
                </div>`;
            }).join('');
        }

        window.handleComplete = async (pid) => {
            const p = players.find(x => x.id === pid);
            const batch = writeBatch(db);
            batch.set(doc(collection(db, 'artifacts', appId, 'public', 'data', 'history')), { ...p, completedAt: new Date().toISOString(), timestamp: Date.now() });
            batch.delete(doc(db, 'artifacts', appId, 'public', 'data', 'registrations', pid));
            await batch.commit(); showNotify("Đã vinh danh!");
        };

        async function init() {
            await signInAnonymously(auth);
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'registrations'), s => {
                players = s.docs.map(d => ({ id: d.id, ...d.data() })); renderDynamicUI();
            });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'history'), s => {
                history = s.docs.map(d => ({ id: d.id, ...d.data() })); // renderHOF logic here
            });
            const subTypeSelect = document.getElementById('form-subtype');
            const items = [...new Set(STAGES.flatMap(s => s.items))].sort();
            subTypeSelect.innerHTML = items.map(i => `<option value="${i}">${i}</option>`).join('');

            document.getElementById('registration-form').onsubmit = async (e) => {
                e.preventDefault();
                const data = { 
                    name: document.getElementById('form-name').value.toUpperCase(),
                    subType: document.getElementById('form-subtype').value,
                    top: document.getElementById('form-top').value,
                    stageId: activeStage.id, cycleOffset: 0, createdAt: Date.now()
                };
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'registrations'), data);
                switchTab('dashboard'); showNotify("Ghi danh thành công!");
            };
            setInterval(updateTime, 1000);
        }
        init();
    </script>
</body>
</html>
