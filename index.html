<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumos Race Ultra Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #020617);
            color: #f8fafc;
            min-height: 100vh;
        }
        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .neo-shadow {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }
        .tab-active {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }
        .status-dot {
            box-shadow: 0 0 8px currentColor;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- HỆ THỐNG ICON SVG TÙY CHỈNH ---
        const Icons = {
            Flame: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
                </svg>
            ),
            Plus: () => (
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            ),
            User: () => (
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle>
                </svg>
            ),
            Trophy: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path>
                </svg>
            ),
            Trash: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                </svg>
            )
        };

        const RACE_SCHEDULE = [
            { id: 1, title: "Thân Mật + Hẹn Hò + Khí", duration: 3 },
            { id: 2, title: "Tư Chất + Bạc + Dược", duration: 3 },
            { id: 3, title: "Thể Lực + Mèo + Cây", duration: 3 },
            { id: 4, title: "Luân Chiến + Thân Mật + Hoa + Khí", duration: 4 },
            { id: 5, title: "Thể Lực + Tư Chất + Cầu Nguyện", duration: 4 },
        ];

        const START_DATE = new Date(2026, 2, 23); // Ngày 23/3/2026
        const APP_ID = "lumos_race_v2_storage";

        function App() {
            // Khởi tạo state an toàn từ localStorage
            const [players, setPlayers] = useState(() => {
                const saved = localStorage.getItem(APP_ID);
                return saved ? JSON.parse(saved) : [];
            });
            const [view, setView] = useState('board');
            const [formData, setFormData] = useState({ name: '', category: 'Thân Mật', top: 'Top 1' });
            const [search, setSearch] = useState("");

            // Đồng bộ dữ liệu mỗi khi players thay đổi
            useEffect(() => {
                localStorage.setItem(APP_ID, JSON.stringify(players));
            }, [players]);

            const raceInfo = useMemo(() => {
                const now = new Date();
                const totalDuration = RACE_SCHEDULE.reduce((a, b) => a + b.duration, 0);
                const diffDays = Math.floor((now - START_DATE) / (1000 * 60 * 60 * 24));
                const currentDay = ((diffDays % totalDuration) + totalDuration) % totalDuration;

                let acc = 0;
                for (let race of RACE_SCHEDULE) {
                    if (currentDay >= acc && currentDay < acc + race.duration) {
                        return { ...race, daysLeft: race.duration - (currentDay - acc) };
                    }
                    acc += race.duration;
                }
                return RACE_SCHEDULE[0];
            }, []);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.name.trim()) return;
                const newPlayer = {
                    ...formData,
                    id: Date.now(),
                    status: 'active',
                    timestamp: new Date().toLocaleDateString('vi-VN')
                };
                setPlayers([newPlayer, ...players]);
                setFormData({ ...formData, name: '' });
                setView('queue');
            };

            const toggleStatus = (id) => {
                setPlayers(players.map(p => p.id === id ? { ...p, status: p.status === 'active' ? 'done' : 'active' } : p));
            };

            const deletePlayer = (id) => {
                if (window.confirm("Xóa thành viên này khỏi danh sách?")) {
                    setPlayers(players.filter(p => p.id !== id));
                }
            };

            const filteredPlayers = players.filter(p => p.name.toLowerCase().includes(search.toLowerCase()));

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col p-5">
                    {/* Header Section */}
                    <header className="flex justify-between items-center mb-8">
                        <div>
                            <div className="flex items-center gap-2 text-indigo-400 mb-1">
                                <Icons.Flame />
                                <span className="text-[10px] font-black uppercase tracking-[0.2em]">Dashboard</span>
                            </div>
                            <h1 className="text-2xl font-extrabold tracking-tight text-white">LUMOS <span className="text-indigo-500 italic">RACE</span></h1>
                        </div>
                        <div className="text-right">
                            <div className="text-[10px] text-slate-500 font-bold uppercase mb-1">Chặng Hiện Tại</div>
                            <div className="bg-indigo-500/10 border border-indigo-500/30 px-3 py-1 rounded-full flex items-center gap-2">
                                <span className="w-2 h-2 rounded-full bg-indigo-500 status-dot"></span>
                                <span className="text-[11px] font-bold text-indigo-100">{raceInfo.daysLeft} Ngày</span>
                            </div>
                        </div>
                    </header>

                    {/* Current Race Banner */}
                    <div className="glass p-5 rounded-3xl mb-8 neo-shadow relative overflow-hidden group">
                        <div className="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                            <Icons.Trophy />
                        </div>
                        <div className="relative z-10">
                            <h3 className="text-slate-400 text-xs font-semibold mb-2 flex items-center gap-2 uppercase tracking-wider">
                                Nội dung đua chặng
                            </h3>
                            <p className="text-lg font-bold text-white leading-tight">{raceInfo.title}</p>
                        </div>
                    </div>

                    {/* Navigation Tabs */}
                    <div className="flex bg-slate-900/50 p-1.5 rounded-2xl mb-6 border border-slate-800/50">
                        {[
                            { id: 'board', label: 'BẢNG VÀNG', icon: <Icons.Trophy /> },
                            { id: 'queue', label: 'HÀNG CHỜ', icon: <Icons.User /> },
                            { id: 'reg', label: 'GHI DANH', icon: <Icons.Plus /> }
                        ].map(tab => (
                            <button
                                key={tab.id}
                                onClick={() => setView(tab.id)}
                                className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-xl transition-all duration-300 ${
                                    view === tab.id ? 'tab-active text-white' : 'text-slate-500 hover:text-slate-300'
                                }`}
                            >
                                <span className={view === tab.id ? 'scale-90' : 'scale-75 opacity-70'}>{tab.icon}</span>
                                <span className="text-[10px] font-bold tracking-wider">{tab.label}</span>
                            </button>
                        ))}
                    </div>

                    {/* Main Content Area */}
                    <main className="flex-1 space-y-4">
                        {view === 'reg' && (
                            <div className="glass p-6 rounded-3xl animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <form onSubmit={handleSubmit} className="space-y-6">
                                    <div>
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3 block">Tên nhân vật</label>
                                        <input 
                                            autoFocus
                                            className="w-full bg-slate-800/50 border-b-2 border-slate-700 p-4 rounded-xl text-white outline-none focus:border-indigo-500 transition-all font-bold placeholder:text-slate-600 uppercase"
                                            placeholder="NHẬP TÊN..."
                                            value={formData.name}
                                            onChange={e => setFormData({...formData, name: e.target.value.toUpperCase()})}
                                        />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3 block">Loại hình</label>
                                            <select 
                                                className="w-full bg-slate-800/50 border border-slate-700 p-3 rounded-xl text-sm text-white outline-none focus:border-indigo-500"
                                                value={formData.category}
                                                onChange={e => setFormData({...formData, category: e.target.value})}
                                            >
                                                {["Thân Mật", "Hẹn Hò", "Khí", "Tư Chất", "Bạc", "Dược", "Thể Lực", "Mèo", "Cây", "Luân Chiến", "Hoa"].map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3 block">Mục tiêu</label>
                                            <select 
                                                className="w-full bg-slate-800/50 border border-slate-700 p-3 rounded-xl text-sm text-white outline-none focus:border-indigo-500"
                                                value={formData.top}
                                                onChange={e => setFormData({...formData, top: e.target.value})}
                                            >
                                                {["Top 1", "Top 2", "Top 3", "Top 5", "Top 10", "Top 20", "Top 50"].map(t => <option key={t} value={t}>{t}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <button className="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl font-black text-xs tracking-[0.2em] text-white shadow-lg active:scale-95 transition-all">
                                        XÁC NHẬN GHI DANH
                                    </button>
                                </form>
                            </div>
                        )}

                        {(view === 'board' || view === 'queue') && (
                            <div className="space-y-3">
                                <div className="relative group">
                                    <input 
                                        placeholder="Tìm kiếm đồng đội..." 
                                        className="w-full bg-slate-900/50 border border-slate-800/50 py-3 px-5 pl-12 rounded-2xl text-xs outline-none focus:border-indigo-500/50 transition-all text-slate-300"
                                        onChange={e => setSearch(e.target.value)}
                                    />
                                    <div className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-600">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                                    </div>
                                </div>

                                {filteredPlayers.filter(p => view === 'board' ? p.status === 'done' : p.status === 'active').length === 0 ? (
                                    <div className="text-center py-20 bg-slate-900/20 rounded-3xl border border-dashed border-slate-800">
                                        <p className="text-slate-600 text-xs font-medium italic">Không có dữ liệu hiển thị</p>
                                    </div>
                                ) : (
                                    filteredPlayers
                                        .filter(p => view === 'board' ? p.status === 'done' : p.status === 'active')
                                        .map(p => (
                                            <div key={p.id} className="glass p-4 rounded-2xl flex justify-between items-center group hover:bg-slate-800/40 transition-colors">
                                                <div className="flex items-center gap-4">
                                                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center font-black text-xs ${
                                                        p.status === 'done' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-indigo-500/20 text-indigo-400'
                                                    }`}>
                                                        {p.name.charAt(0)}
                                                    </div>
                                                    <div>
                                                        <h4 className="font-extrabold text-sm text-white tracking-wide">{p.name}</h4>
                                                        <div className="flex gap-2 items-center mt-1">
                                                            <span className="text-[9px] font-black text-slate-500 uppercase">{p.category}</span>
                                                            <span className="w-1 h-1 rounded-full bg-slate-700"></span>
                                                            <span className="text-[9px] font-black text-indigo-400 uppercase">{p.top}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                                    <button 
                                                        onClick={() => toggleStatus(p.id)}
                                                        className={`p-2 rounded-lg transition-colors ${
                                                            p.status === 'active' ? 'bg-emerald-500/20 text-emerald-500 hover:bg-emerald-500/30' : 'bg-indigo-500/20 text-indigo-500 hover:bg-indigo-500/30'
                                                        }`}
                                                    >
                                                        {p.status === 'active' ? 'XONG' : 'KHÔI PHỤC'}
                                                    </button>
                                                    <button 
                                                        onClick={() => deletePlayer(p.id)}
                                                        className="p-2 bg-red-500/10 text-red-500 rounded-lg hover:bg-red-500/20"
                                                    >
                                                        <Icons.Trash />
                                                    </button>
                                                </div>
                                                {/* Mobile visible indicator */}
                                                <div className="group-hover:hidden flex items-center gap-2">
                                                    <div className="text-[8px] font-bold text-slate-600 uppercase text-right leading-tight">
                                                        {p.timestamp}<br/>RECORDED
                                                    </div>
                                                </div>
                                            </div>
                                        ))
                                )}
                            </div>
                        )}
                    </main>

                    {/* Footer Info */}
                    <footer className="mt-8 pt-6 border-t border-slate-800 flex justify-between items-center">
                        <div className="text-[9px] text-slate-600 font-bold uppercase tracking-widest">
                            LUMOS RACE SYSTEM • v2.0
                        </div>
                        <div className="text-[9px] text-slate-600 font-bold uppercase">
                            Total: {players.length} Players
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
